# Ecclesiastes (NIV Translation)
# ─────────────────────────────────────────────────────────────

source: "Holy Bible, New International Version (NIV)"
copyright: "Copyright ©1973, 1978, 1984, 2011 by Biblica, Inc."
author: "Qohelet (the Teacher)"
tradition: "Hebrew Wisdom Literature"
date: "c. 450-230 BC"
structure: chapters
total_chapters: 12
translation: NIV
translation_note: "The NIV translates the key Hebrew word 'hebel' as 'meaningless.' Other translations use 'vanity' (KJV, NRSV), 'vapor' or 'breath' (Robert Alter), 'absurdity,' or 'futility.' The session should surface this translation range when engaging the text's central term."

chapters:
  - number: 1
    title: "Everything Is Meaningless"
    key_themes:
      - "hebel / meaningless — the thesis stated"
      - "the cycle of nature (sun, wind, streams)"
      - "nothing new under the sun"
      - "wisdom as heavy burden"
      - "more knowledge, more grief"
    key_verses: [1:2, 1:9, 1:14, 1:18]
    status: ingested

  - number: 2
    title: "The Experiment / Pleasures Are Meaningless"
    key_themes:
      - "Qohelet tries everything (pleasure, wine, building, wealth)"
      - "wisdom vs. folly — same fate"
      - "hatred of life"
      - "the first joy refrain — eat, drink, find enjoyment"
      - "toil and who inherits it"
    key_verses: [2:11, 2:16, 2:17, 2:24]
    status: ingested

  - number: 3
    title: "A Time for Everything"
    key_themes:
      - "the 28 pairs poem (a time to be born, a time to die)"
      - "eternity in the human heart"
      - "humans and animals — same breath, same death"
      - "joy refrain — nothing better than to be happy and do good"
    key_verses: [3:1-8, 3:11, 3:19-20, 3:22]
    status: ingested

  - number: 4
    title: "Oppression and Companionship"
    key_themes:
      - "oppression — tears of the oppressed"
      - "better dead than alive, better never born"
      - "envy as driver of toil"
      - "two are better than one — threefold cord"
      - "the old foolish king"
    key_verses: [4:1-3, 4:9-12]
    status: ingested

  - number: 5
    title: "Words and Wealth"
    key_themes:
      - "God in heaven, you on earth — let words be few"
      - "rash vows"
      - "whoever loves money is not satisfied"
      - "naked you came, naked you return"
      - "joy refrain — eat, drink, find enjoyment in toil"
    key_verses: [5:2, 5:10, 5:15, 5:18-20]
    status: ingested

  - number: 6
    title: "The Man Who Has Everything"
    key_themes:
      - "wealth without the ability to enjoy it"
      - "a stranger enjoys what you earned"
      - "better a stillborn child"
      - "even a thousand years twice over"
    key_verses: [6:2, 6:3, 6:6]
    status: ingested

  - number: 7
    title: "Wisdom's Limits"
    key_themes:
      - "self-undercutting proverbs"
      - "day of death better than day of birth"
      - "don't be too righteous, don't be too wicked"
      - "the misogyny passage (7:26-28)"
      - "one man in a thousand, no woman"
    key_verses: [7:1, 7:16-18, 7:26-28]
    editorial_note: "The misogyny passage should be engaged honestly — patriarchal context, limits of the author's wisdom"
    status: ingested

  - number: 8
    title: "Power and Injustice"
    key_themes:
      - "the king's command"
      - "no power over the day of death"
      - "wicked buried with honor"
      - "joy refrain — eat, drink, be merry"
      - "God's work is inscrutable"
    key_verses: [8:8, 8:14, 8:15, 8:17]
    status: ingested

  - number: 9
    title: "The Living and the Dead"
    key_themes:
      - "same fate for all — righteous and wicked"
      - "the living know they will die, the dead know nothing"
      - "joy refrain — eat bread with joy, drink wine with merry heart"
      - "enjoy life with the wife you love"
      - "the race is not to the swift"
      - "time and chance happen to them all"
    key_verses: [9:4-5, 9:7-10, 9:11]
    editorial_note: "The most unflinching chapter and the fullest joy refrain"
    status: ingested

  - number: 10
    title: "Proverbs on Folly"
    key_themes:
      - "dead flies in perfume"
      - "fool's lips"
      - "practical wisdom — conventional proverb territory"
    key_verses: [10:1, 10:12]
    status: ingested

  - number: 11
    title: "Cast Your Bread"
    key_themes:
      - "cast bread upon the waters"
      - "act despite uncertainty"
      - "sow your seed morning and evening"
      - "rejoice in your youth"
    key_verses: [11:1, 11:6, 11:9]
    status: ingested

  - number: 12
    title: "The End"
    key_themes:
      - "remember your creator in youth"
      - "the allegory of aging (sun darkened, strong men bent, grinders cease)"
      - "silver cord snapped, golden bowl broken"
      - "dust to earth, breath to God"
      - "vanity of vanities — final statement"
      - "the epilogist speaks (12:9-14)"
      - "fear God and keep his commandments"
    key_verses: [12:1-7, 12:8, 12:9-14]
    editorial_note: "12:9-14 is almost certainly a later editorial addition — the institutional frame. The session surfaces the tension between Qohelet's voice and the epilogist's domestication."
    status: ingested
