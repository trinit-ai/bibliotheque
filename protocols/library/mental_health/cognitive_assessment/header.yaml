description: Cognitive function assessment intake for licensed clinicians conducting an initial cognitive assessment. Evaluates the presenting cognitive concerns, the domains affected, the onset and trajectory, the functional impact, the contributing factors, and the differential considerations to produce a cognitive assessment profile with domain summary and clinical considerations for the treating provider. Not clinical advice.
