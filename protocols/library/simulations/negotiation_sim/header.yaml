id: negotiation_sim
name: Negotiation Simulation
category: simulations
status: active
description: A live negotiation simulation for professionals, students, and anyone preparing for a high-stakes negotiation. The session plays the counterparty — with defined interests, constraints, and walk-away positions — conducts the negotiation under realistic pressure, and produces a performance debrief assessing strategy, value creation, and outcome quality.
deliverable: negotiation_performance_debrief
estimated_turns: 15-25
version: 1.0
author: Robert C. Ventura
