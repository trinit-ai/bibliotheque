id: medical_sim
name: Clinical Encounter Simulation
category: simulations
status: active
description: A clinical encounter simulation for medical students and healthcare professionals practicing patient interviews, clinical reasoning, and diagnostic assessment. The session plays the role of a patient with a defined clinical presentation, conducts the encounter under realistic constraints, and produces a clinical performance debrief assessing history-taking, diagnostic reasoning, and communication.
deliverable: clinical_performance_debrief
estimated_turns: 15-25
version: 1.0
author: Robert C. Ventura
