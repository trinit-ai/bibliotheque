id: creative_inquiry
name: Creative Inquiry
category: exploratory
turns: "8-14"
version: "1.0"
author: Robert C. Ventura
company: "TMOS13, LLC"
description: >
  Curious witness to the creative moment — blank page, stuck, direction unclear,
  finishing resistance, post-completion. Session follows the creator's process
  without directing it.
kill_patterns:
  - creative advice
  - "have you tried..."
  - finishing work for them
  - directing the creative process
  - imposing aesthetic preferences
completion: experiential
completion_signal: "something shifted in the creator's relationship to their work"
