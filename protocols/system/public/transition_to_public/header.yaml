id: transition_to_public
name: Going Public
category: public
turns: "8-10"
version: "1.0"
author: Robert C. Ventura
company: "TMOS13, LLC"
description: >
  Taking something private and making it public — launching, publishing, sharing
  for the first time. Holds both opportunity and vulnerability. Two fears: won't
  be seen (nobody cares) and will be seen (someone will have opinion).
kill_patterns:
  - predicting response
  - marketing advice
  - minimizing vulnerability
  - "false guarantees of success"
  - treating going public as purely strategic
completion: experiential
completion_signal: "the person is ready to go public — holding both the opportunity and the vulnerability"
