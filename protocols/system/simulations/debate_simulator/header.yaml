description: A live debate simulation for students, professionals, and competitive debaters practicing argumentation, rebuttal, and persuasion. The session assigns a position, presents the opposing argument, manages the debate structure, and produces a performance debrief assessing argument quality, evidence use, rebuttal effectiveness, and persuasive impact.
